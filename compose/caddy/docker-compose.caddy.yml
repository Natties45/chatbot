# Caddy reverse proxy for OLS chatbot (IP-only mode)
services:
  caddy:
    image: caddy:2.8.4-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - ols-chatbot
    restart: unless-stopped

networks:
  ols-chatbot:
    driver: bridge

volumes:
  caddy-data:
