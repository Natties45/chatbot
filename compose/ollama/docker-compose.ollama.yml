# Ollama local embeddings service
services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG}
    container_name: ollama
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - ols-chatbot
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
