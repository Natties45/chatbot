# Base compose file for OLS chatbot stack
# Uses `include` (Compose v2.20+) to merge all sub-stacks into one entry point.
# Single command: docker compose -f compose/docker-compose.yml up -d

include:
  - dify/docker-compose.yaml
  - n8n/docker-compose.n8n.yml
  - ollama/docker-compose.ollama.yml
  - caddy/docker-compose.caddy.yml

networks:
  ols-chatbot:
    driver: bridge

volumes:
  dify-data:
  n8n-data:
  ollama-models:
  weaviate-data:
  caddy-data:
